---
- name: Download clickhouse packages
  ansible.builtin.get_url:
    url: "https://packages.clickhouse.com/rpm/stable/{{ item.name }}-{{ clickhouse_version }}.{{ item.arch }}.rpm"
    dest: "/tmp/{{ item.name }}-{{ clickhouse_version }}.rpm"
    mode: "0644"
  with_items: "{{ clickhouse_packages }}"
- name: Install clickhouse packages
  ansible.builtin.yum:
    name:
      - "/tmp/clickhouse-client-{{ clickhouse_version }}.rpm"
      - "/tmp/clickhouse-server-{{ clickhouse_version }}.rpm"
      - "/tmp/clickhouse-common-static-{{ clickhouse_version }}.rpm"
    disable_gpg_check: true
    state: present
  notify: Start clickhouse service
- name: Configure Clickhouse to listen on all interfaces
  ansible.builtin.template:
    src: listen.xml.j2
    dest: /etc/clickhouse-server/config.d/listen.xml
    mode: '0644'
  notify: Restart clickhouse service
- name: Ensure Clickhouse service is started and enabled
  ansible.builtin.service:
    name: clickhouse-server
    state: started
    enabled: true
- name: Flush handlers
  ansible.builtin.meta: flush_handlers
- name: Wait 10 seconds for Clickhouse to start
  ansible.builtin.pause:
    seconds: 10
- name: Create database
  ansible.builtin.command: "clickhouse-client --host 127.0.0.1 --port 9000 -q 'create database logs;'"
  register: create_db
  failed_when: create_db.rc != 0 and create_db.rc != 82
  changed_when: create_db.rc == 0
- name: Install firewalld and python bindings
  ansible.builtin.yum:
    name:
      - firewalld
      - python3-firewall
    state: present
- name: Start and enable firewalld
  ansible.builtin.service:
    name: firewalld
    state: started
    enabled: true
- name: Open 8123 port in firewall
  ansible.posix.firewalld:
    port: 8123/tcp
    permanent: true
    state: enabled
    immediate: true
