---
- name: Lighthouse | install dependencies
  ansible.builtin.yum:
    name: git
    state: present
- name: Lighthouse | Clone repository
  ansible.builtin.git:
    repo: "{{ lighthouse_vsc }}"
    version: master
    dest: "{{ lighthouse_location_dir }}"
- name: Lighthouse | Deploy nginx config
  ansible.builtin.template:
    src: nginx.conf.j2
    dest: /etc/nginx/nginx.conf
    mode: '0644'
  notify: reload-nginx
